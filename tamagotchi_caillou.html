<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamagotchi Caillou 🪨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #f5efe0;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(200,180,140,0.3) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(180,160,120,0.2) 0%, transparent 50%);
  }

  .device {
    width: 280px;
    background: #e8dcc8;
    border-radius: 40px 40px 60px 60px;
    border: 4px solid #c4a882;
    box-shadow:
      0 8px 0 #a08060,
      0 12px 30px rgba(0,0,0,0.25),
      inset 0 2px 4px rgba(255,255,255,0.5);
    padding: 24px 20px 32px;
    position: relative;
  }

  .device::before {
    content: '';
    position: absolute;
    top: 12px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 8px;
    background: rgba(255,255,255,0.4);
    border-radius: 4px;
  }

  .title {
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: #3d2b1f;
    letter-spacing: 2px;
    margin-bottom: 16px;
    opacity: 0.6;
  }

  .screen {
    background: #d4e8c2;
    border-radius: 20px;
    border: 3px solid #8ab06a;
    box-shadow: inset 0 4px 12px rgba(0,0,0,0.15), 0 2px 4px rgba(255,255,255,0.6);
    position: relative;
    overflow: hidden;
    height: 240px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .screen::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
    border-radius: 18px 18px 0 0;
    pointer-events: none;
    z-index: 10;
  }

  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 22px;
    background: linear-gradient(to bottom, #b8d890, #90b870);
    border-radius: 0 0 18px 18px;
  }

  #caillou {
    width: 130px;
    height: 130px;
    object-fit: contain;
    position: relative;
    z-index: 2;
    margin-bottom: 14px;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.3));
    animation: idle-bob 2s ease-in-out infinite;
    transform-origin: center bottom;
    transition: opacity 0.3s ease;
  }

  @keyframes idle-bob {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-8px); }
  }

  @keyframes bounce-play {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    25% { transform: translateY(-15px) rotate(-5deg); }
    50% { transform: translateY(-20px) rotate(0deg); }
    75% { transform: translateY(-15px) rotate(5deg); }
  }

  @keyframes shake-warning {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
    20%, 40%, 60%, 80% { transform: translateX(3px); }
  }

  /* Barre XP */
  .xp-container {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .xp-label {
    font-family: 'Fredoka One', cursive;
    font-size: 0.7rem;
    color: #3d2b1f;
    min-width: 30px;
  }

  .xp-bar-container {
    flex: 1;
    height: 14px;
    background: rgba(255,255,255,0.4);
    border-radius: 8px;
    border: 2px solid #a08060;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
  }

  .xp-bar {
    height: 100%;
    background: linear-gradient(135deg, #4ade80, #22c55e);
    transition: width 0.5s ease-out;
    position: relative;
    overflow: hidden;
  }

  .xp-bar::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
  }

  .xp-text {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Fredoka One', cursive;
    font-size: 0.6rem;
    color: #3d2b1f;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    z-index: 1;
  }

  .stats {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stat-label {
    font-family: 'Fredoka One', cursive;
    font-size: 0.75rem;
    color: #3d2b1f;
    min-width: 65px;
    text-align: right;
  }

  .stat-bar-container {
    flex: 1;
    height: 18px;
    background: rgba(255,255,255,0.4);
    border-radius: 10px;
    border: 2px solid #a08060;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
  }

  .stat-bar {
    height: 100%;
    transition: width 0.5s ease-out, background-color 0.3s ease;
    border-radius: 8px 0 0 8px;
    position: relative;
    overflow: hidden;
  }

  .stat-bar::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
  }

  .stat-value {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Fredoka One', cursive;
    font-size: 0.65rem;
    color: #3d2b1f;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    z-index: 1;
  }

  .faim { background: linear-gradient(135deg, #ff9a76, #ff6b6b); }
  .amusement { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
  .bonheur { background: linear-gradient(135deg, #ffd93d, #ffb142); }

  .buttons-row {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .btn {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1.4rem;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--sh) !important; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  .btn.feed {
    background: #e8b860;
    box-shadow: 0 5px 0 #b8884a;
    --sh: #b8884a;
  }

  .btn.pet {
    background: #f0a0c0;
    box-shadow: 0 5px 0 #c06080;
    --sh: #c06080;
  }

  .btn.play {
    background: #a29bfe;
    box-shadow: 0 5px 0 #6c5ce7;
    --sh: #6c5ce7;
  }

  .btn-label {
    font-family: 'Fredoka One', cursive;
    font-size: 0.65rem;
    color: #3d2b1f;
    letter-spacing: 0.5px;
  }

  /* Feedback visuel pour le jeu */
  .play-emoji {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3rem;
    opacity: 0;
    z-index: 15;
    pointer-events: none;
    animation: float-up 1s ease-out;
  }

  @keyframes float-up {
    0% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(0.5);
    }
    50% {
      opacity: 1;
      transform: translate(-50%, -80px) scale(1.2);
    }
    100% {
      opacity: 0;
      transform: translate(-50%, -120px) scale(0.8);
    }
  }

  /* Notification d'évolution */
  .evolution-notification {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #e8dcc8;
    border-radius: 20px;
    border: 4px solid #c4a882;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    padding: 30px 40px;
    text-align: center;
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    animation: evolutionPop 3s ease-out;
  }

  @keyframes evolutionPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    10% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    20% { transform: translate(-50%, -50%) scale(1); }
    80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
  }

  .evolution-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: #4ade80;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
  }

  .evolution-message {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: #3d2b1f;
  }

  /* Game Over Overlay */
  .game-over-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.5s ease-out;
  }

  .game-over-overlay.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .game-over-box {
    background: #e8dcc8;
    border-radius: 30px;
    border: 4px solid #c4a882;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    padding: 40px 30px;
    text-align: center;
    max-width: 300px;
    animation: slideUp 0.5s ease-out;
  }

  @keyframes slideUp {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* US-07 : Écran de nommage */
  .naming-screen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .naming-screen.hidden { display: none; }

  .naming-card {
    background: #e8dcc8;
    border-radius: 28px;
    border: 4px solid #c4a882;
    box-shadow: 0 10px 0 #a08060, 0 16px 40px rgba(0,0,0,0.35);
    padding: 30px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 260px;
  }

  .naming-sprite {
    width: 90px;
    height: 90px;
    object-fit: contain;
    animation: idle-bob 2s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
  }

  .naming-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: #3d2b1f;
    text-align: center;
    letter-spacing: 1px;
  }

  .naming-input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 14px;
    border: 3px solid #c4a882;
    background: #f5efe0;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: #3d2b1f;
    text-align: center;
    outline: none;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
    transition: border-color 0.2s;
  }

  .naming-input:focus { border-color: #e8b860; }

  .naming-btn {
    width: 100%;
    padding: 12px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    letter-spacing: 1px;
    background: #e8b860;
    color: #3d2b1f;
    box-shadow: 0 5px 0 #b8884a;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .naming-btn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #b8884a;
  }

  /* Nom affiché dans le titre */
  .title span {
    font-size: 0.75rem;
    opacity: 0.8;
    display: block;
    letter-spacing: 1px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: #8b4513;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
  }

  .game-over-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: #8b4513;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
  }

  .game-over-emoji {
    font-size: 4rem;
    margin: 20px 0;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .game-over-message {
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    color: #3d2b1f;
    margin-bottom: 30px;
    line-height: 1.5;
  }

  .restart-btn {
    background: #90b870;
    border: none;
    border-radius: 25px;
    padding: 15px 40px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 0 #6a8a50;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 7px 0 #6a8a50;
  }

  .restart-btn:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #6a8a50;
  }

  /* Animation de fissure */
  .cracked {
    animation: shake-warning 0.5s ease-in-out;
  }
</style>
</head>
<body>

<div class="naming-screen hidden" id="naming-screen">
  <div class="naming-card">
    <img class="naming-sprite" src="images/Sprite caillou.png" alt="Caillou" />
    <div class="naming-title">🪨 Un nouveau caillou est né !<br>Donne-lui un prénom</div>
    <input class="naming-input" id="naming-input" type="text" maxlength="12" placeholder="Rocky" />
    <button class="naming-btn" onclick="confirmName()">C'est parti ! 🪨</button>
  </div>
</div>

<div class="device">
  <div class="title" id="device-title">🪨 CAILLOU 🪨</div>

  <div class="screen" id="game-screen">
    <div class="ground"></div>
    <img id="caillou" src="images/Sprite caillou.png" alt="Caillou" />
  </div>

  <!-- Barre XP -->
  <div class="xp-container">
    <div class="xp-label">⭐ XP</div>
    <div class="xp-bar-container">
      <div class="xp-bar" id="xp-bar" style="width: 0%"></div>
      <div class="xp-text" id="xp-text">0/50</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-row">
      <div class="stat-label">🍖 Faim</div>
      <div class="stat-bar-container">
        <div class="stat-bar faim" id="faim-bar" style="width: 100%"></div>
        <div class="stat-value" id="faim-value">100%</div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-label">🎮 Amusement</div>
      <div class="stat-bar-container">
        <div class="stat-bar amusement" id="amusement-bar" style="width: 100%"></div>
        <div class="stat-value" id="amusement-value">100%</div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-label">😊 Bonheur</div>
      <div class="stat-bar-container">
        <div class="stat-bar bonheur" id="bonheur-bar" style="width: 100%"></div>
        <div class="stat-value" id="bonheur-value">100%</div>
      </div>
    </div>
  </div>

  <div class="buttons-row" id="action-buttons">
    <div class="btn-group">
      <button class="btn feed" id="btn-feed" onclick="feed()">🍃</button>
      <span class="btn-label">NOURRIR</span>
    </div>
    
    <div class="btn-group">
      <button class="btn pet" id="btn-pet" onclick="pet()">🤚</button>
      <span class="btn-label">CARESSER</span>
    </div>
    
    <div class="btn-group">
      <button class="btn play" id="btn-play" onclick="play()">🎮</button>
      <span class="btn-label">JOUER</span>
    </div>
  </div>
</div>

<!-- Game Over Overlay -->
<div class="game-over-overlay" id="game-over-overlay">
  <div class="game-over-box">
    <div class="game-over-title">GAME OVER</div>
    <div class="game-over-emoji">💔</div>
    <div class="game-over-message" id="game-over-message">
      Ton caillou s'est complètement fissuré...<br>
      Tu l'as trop négligé !
    </div>
    <button class="restart-btn" onclick="restartGame()">🔄 RECOMMENCER</button>
  </div>
</div>

<script>
  // ====================================
  // CONFIGURATION
  // ====================================
  const CONFIG = {
    STORAGE_KEY: 'tamagotchi_caillou_data',
    DECAY_INTERVAL: 5000, // 30 secondes
    DECAY_AMOUNT: 10,
    XP_PER_INTERACTION: 5,      // XP gagnée par interaction
    EVOLUTION_THRESHOLD: 50,     // XP nécessaire pour évoluer
    IMAGES: {
      // Stade 1 : Galet (0-49 XP)
      STAGE1: {
        HAPPY: 'images/Happy_caillou.png',
        NEUTRAL: 'images/Sprite caillou.png',
        HUNGRY: 'images/Hungry_caillou.png',
        SAD: 'images/Bored_caillou.png',
        CRACKED: 'images/Neglected_caillou.png',
        DEAD: 'images/Dead_caillou.png',
        FEED: 'images/Feed_caillou.png',
        PET: 'images/Pet_caillou.png'
      },
      // Stade 2 : Rocher (50+ XP)
      STAGE2: {
        HAPPY: 'images/happy_rock.png',
        NEUTRAL: 'images/sprite_rock.png',
        HUNGRY: 'images/hungry_rock.png',
        SAD: 'images/bored_rock.png',
        CRACKED: 'images/neglected_rock.png',
        DEAD: 'images/dead_rock.png',
        FEED: 'images/feed_rock.png',
        PET: 'images/pet_rock.png'
      }
    },
    CRITICAL_THRESHOLD: 30,
    CRACKED_THRESHOLD: 10,
    PLAY_BOOST_MIN: 20,
    PLAY_BOOST_MAX: 30
  };

  // ====================================
  // ÉTAT DU CAILLOU
  // ====================================
  let caillouState = {
    name: '',
    xp: 0,                    // XP actuelle
    evolutionStage: 1,        // Stade d'évolution (1 ou 2)
    hunger: 100,
    boredom: 100,
    happiness: 100,
    lastUpdate: Date.now(),
    currentMood: 'happy',
    isDead: false
  };

  let decayTimer = null;

  // ====================================
  // SYSTÈME D'XP ET D'ÉVOLUTION
  // ====================================

  /**
   * Gagne de l'XP et vérifie l'évolution
   */
  function gainXP(amount) {
    const oldStage = caillouState.evolutionStage;
    caillouState.xp += amount;

    // Vérifier l'évolution
    if (caillouState.xp >= CONFIG.EVOLUTION_THRESHOLD && caillouState.evolutionStage === 1) {
      caillouState.evolutionStage = 2;
      showEvolutionNotification();
      console.log(`🎉 ÉVOLUTION ! Stade ${caillouState.evolutionStage}`);
    }

    updateXPDisplay();
    saveToLocalStorage();
  }

  /**
   * Met à jour l'affichage de la barre XP
   */
  function updateXPDisplay() {
    const xpBar = document.getElementById('xp-bar');
    const xpText = document.getElementById('xp-text');

    // Calculer le pourcentage pour la barre (0-50 XP = 0-100%)
    let percentage = (caillouState.xp / CONFIG.EVOLUTION_THRESHOLD) * 100;
    
    // Si évolué, la barre reste à 100%
    if (caillouState.evolutionStage >= 2) {
      percentage = 100;
      xpText.textContent = `MAX`;
    } else {
      percentage = Math.min(100, percentage);
      xpText.textContent = `${caillouState.xp}/${CONFIG.EVOLUTION_THRESHOLD}`;
    }

    xpBar.style.width = percentage + '%';
  }

  /**
   * Affiche la notification d'évolution
   */
  function showEvolutionNotification() {
    const notification = document.createElement('div');
    notification.className = 'evolution-notification';
    notification.innerHTML = `
      <div class="evolution-title">🎉 ÉVOLUTION ! 🎉</div>
      <div class="evolution-message">${caillouState.name || 'Ton caillou'} est devenu un Rocher !</div>
    `;
    document.body.appendChild(notification);

    // Forcer le recalcul de l'image
    caillouState.currentMood = null;
    updateDisplay();

    // Supprimer après l'animation
    setTimeout(() => {
      notification.remove();
    }, 3000);
  }

  /**
   * Retourne le set d'images selon le stade d'évolution
   */
  function getCurrentImageSet() {
    return caillouState.evolutionStage === 1 ? CONFIG.IMAGES.STAGE1 : CONFIG.IMAGES.STAGE2;
  }

  // ====================================
  // GESTION DE LA MORT DU CAILLOU
  // ====================================
  
  function checkDeath() {
    const hunger = Number(caillouState.hunger) || 0;
    const boredom = Number(caillouState.boredom) || 0;
    const happiness = Number(caillouState.happiness) || 0;

    if (hunger === 0 && boredom === 0 && happiness === 0) {
      caillouState.isDead = true;
      showGameOver();
      return true;
    }

    return false;
  }

  function showGameOver() {
    const overlay = document.getElementById('game-over-overlay');
    const caillouImg = document.getElementById('caillou');
    const buttons = document.getElementById('action-buttons');

    if (decayTimer) {
      clearInterval(decayTimer);
    }

    const imageSet = getCurrentImageSet();
    caillouImg.src = imageSet.DEAD;
    caillouImg.style.animation = 'none';

    buttons.style.opacity = '0.3';
    buttons.style.pointerEvents = 'none';

    setTimeout(() => {
      overlay.classList.add('active');
    }, 500);

    console.log('💀 Game Over - Le caillou est mort');
  }

  function restartGame() {
    console.log('🔄 Redémarrage du jeu...');

    caillouState = {
      name: caillouState.name, // Garder le nom
      xp: 0,                   // Reset XP
      evolutionStage: 1,       // Retour au stade 1
      hunger: 100,
      boredom: 100,
      happiness: 100,
      lastUpdate: Date.now(),
      currentMood: null,
      isDead: false
    };

    localStorage.removeItem(CONFIG.STORAGE_KEY);
    console.log('LocalStorage vidé');

    saveToLocalStorage();

    const overlay = document.getElementById('game-over-overlay');
    overlay.classList.remove('active');

    const buttons = document.getElementById('action-buttons');
    buttons.style.opacity = '1';
    buttons.style.pointerEvents = 'auto';

    const caillouImg = document.getElementById('caillou');
    caillouImg.style.animation = 'idle-bob 2s ease-in-out infinite';
    
    caillouImg.style.opacity = '0';
    setTimeout(() => {
      updateDisplay();
      updateXPDisplay();
      caillouImg.style.opacity = '1';
    }, 150);

    if (decayTimer) {
      clearInterval(decayTimer);
    }
    decayTimer = setInterval(decayStats, CONFIG.DECAY_INTERVAL);

    console.log('✅ Jeu redémarré avec succès!');
  }

  // ====================================
  // GESTION DE L'ÉTAT VISUEL DU CAILLOU
  // ====================================
  
  function calculateMood() {
    const hunger = Number(caillouState.hunger) || 0;
    const boredom = Number(caillouState.boredom) || 0;
    const happiness = Number(caillouState.happiness) || 0;

    if (hunger === 0 && boredom === 0 && happiness === 0) {
      return 'dead';
    }

    if (hunger <= CONFIG.CRACKED_THRESHOLD || 
        boredom <= CONFIG.CRACKED_THRESHOLD || 
        happiness <= CONFIG.CRACKED_THRESHOLD) {
      return 'cracked';
    }

    if (hunger < CONFIG.CRITICAL_THRESHOLD) {
      return 'hungry';
    }
    
    if (happiness < CONFIG.CRITICAL_THRESHOLD || boredom < CONFIG.CRITICAL_THRESHOLD) {
      return 'sad';
    }
    
    const average = (hunger + boredom + happiness) / 3;
    
    if (average >= 60) {
      return 'happy';
    } else {
      return 'neutral';
    }
  }

  function updateCaillouImage() {
    const newMood = calculateMood();
    const caillouImg = document.getElementById('caillou');
    
    if (newMood !== caillouState.currentMood) {
      caillouState.currentMood = newMood;
      
      const imageSet = getCurrentImageSet();
      let newImageSrc;
      
      switch(newMood) {
        case 'dead':
          newImageSrc = imageSet.DEAD;
          break;
        case 'cracked':
          newImageSrc = imageSet.CRACKED;
          caillouImg.classList.add('cracked');
          setTimeout(() => caillouImg.classList.remove('cracked'), 500);
          break;
        case 'happy':
          newImageSrc = imageSet.HAPPY;
          break;
        case 'neutral':
          newImageSrc = imageSet.NEUTRAL;
          break;
        case 'hungry':
          newImageSrc = imageSet.HUNGRY;
          break;
        case 'sad':
          newImageSrc = imageSet.SAD;
          break;
      }
      
      caillouImg.style.opacity = '0';
      setTimeout(() => {
        caillouImg.src = newImageSrc;
        caillouImg.style.opacity = '1';
      }, 150);
      
      console.log(`Humeur changée: ${newMood} (Stade ${caillouState.evolutionStage})`);
    }
  }

  // ====================================
  // SAUVEGARDE / CHARGEMENT
  // ====================================
  
  function saveToLocalStorage() {
    try {
      const dataToSave = {
        name: caillouState.name,
        xp: Number(caillouState.xp),
        evolutionStage: Number(caillouState.evolutionStage),
        hunger: Number(caillouState.hunger),
        boredom: Number(caillouState.boredom),
        happiness: Number(caillouState.happiness),
        lastUpdate: Number(caillouState.lastUpdate),
        currentMood: caillouState.currentMood,
        isDead: caillouState.isDead
      };
      localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(dataToSave));
      console.log('Données sauvegardées:', dataToSave);
    } catch (error) {
      console.error('Erreur lors de la sauvegarde:', error);
    }
  }

  function loadFromLocalStorage() {
    try {
      const savedData = localStorage.getItem(CONFIG.STORAGE_KEY);
      if (savedData) {
        const parsed = JSON.parse(savedData);
        
        caillouState.name = parsed.name || '';
        caillouState.xp = Number(parsed.xp) >= 0 ? Number(parsed.xp) : 0;
        caillouState.evolutionStage = Number(parsed.evolutionStage) || 1;
        caillouState.hunger = Number(parsed.hunger) >= 0 ? Number(parsed.hunger) : 100;
        caillouState.boredom = Number(parsed.boredom) >= 0 ? Number(parsed.boredom) : 100;
        caillouState.happiness = Number(parsed.happiness) >= 0 ? Number(parsed.happiness) : 100;
        caillouState.lastUpdate = Number(parsed.lastUpdate) || Date.now();
        caillouState.currentMood = parsed.currentMood || 'happy';
        caillouState.isDead = parsed.isDead || false;
        
        console.log('Données chargées:', caillouState);
        return true;
      }
    } catch (error) {
      console.error('Erreur lors du chargement:', error);
    }
    return false;
  }

  // ====================================
  // DECAY ET AFFICHAGE
  // ====================================
  
  function catchUpMissedDecay() {
    const now = Date.now();
    const elapsedTime = now - caillouState.lastUpdate;
    const missedIntervals = Math.floor(elapsedTime / CONFIG.DECAY_INTERVAL);
    
    if (missedIntervals > 0) {
      console.log(`Rattrapage de ${missedIntervals} intervalles manqués`);
      
      const totalDecay = CONFIG.DECAY_AMOUNT * missedIntervals;
      caillouState.hunger = Math.max(0, Number(caillouState.hunger) - totalDecay);
      caillouState.boredom = Math.max(0, Number(caillouState.boredom) - totalDecay);
      caillouState.happiness = Math.max(0, Number(caillouState.happiness) - totalDecay);
      caillouState.lastUpdate = now;
      
      saveToLocalStorage();
    }
  }

  function updateDisplay() {
    const hunger = Number(caillouState.hunger) || 0;
    const boredom = Number(caillouState.boredom) || 0;
    const happiness = Number(caillouState.happiness) || 0;
    
    const faimBar = document.getElementById('faim-bar');
    const faimValue = document.getElementById('faim-value');
    if (faimBar && faimValue) {
      faimBar.style.width = hunger + '%';
      faimValue.textContent = Math.round(hunger) + '%';
    }
    
    const amusementBar = document.getElementById('amusement-bar');
    const amusementValue = document.getElementById('amusement-value');
    if (amusementBar && amusementValue) {
      amusementBar.style.width = boredom + '%';
      amusementValue.textContent = Math.round(boredom) + '%';
    }
    
    const bonheurBar = document.getElementById('bonheur-bar');
    const bonheurValue = document.getElementById('bonheur-value');
    if (bonheurBar && bonheurValue) {
      bonheurBar.style.width = happiness + '%';
      bonheurValue.textContent = Math.round(happiness) + '%';
    }
    
    updateCaillouImage();
  }

  function decayStats() {
    if (caillouState.isDead) return;

    caillouState.hunger = Math.max(0, Number(caillouState.hunger) - CONFIG.DECAY_AMOUNT);
    caillouState.boredom = Math.max(0, Number(caillouState.boredom) - CONFIG.DECAY_AMOUNT);
    caillouState.happiness = Math.max(0, Number(caillouState.happiness) - CONFIG.DECAY_AMOUNT);
    caillouState.lastUpdate = Date.now();
    
    saveToLocalStorage();
    updateDisplay();
    checkDeath();
    
    console.log('Stats diminuées:', {
      hunger: caillouState.hunger,
      boredom: caillouState.boredom,
      happiness: caillouState.happiness,
      xp: caillouState.xp,
      stage: caillouState.evolutionStage,
      mood: caillouState.currentMood
    });
  }

  // ====================================
  // ACTIONS DU JOUEUR
  // ====================================

  let isFeeding = false;

  function feed() {
    if (isFeeding || caillouState.isDead) return;
    isFeeding = true;

    const btn = document.getElementById('btn-feed');
    const caillouImg = document.getElementById('caillou');
    btn.disabled = true;

    const imageSet = getCurrentImageSet();
    caillouImg.style.opacity = '0';
    setTimeout(() => {
      caillouImg.src = imageSet.FEED;
      caillouImg.style.opacity = '1';
    }, 150);

    setTimeout(() => {
      caillouState.hunger = Math.min(100, Number(caillouState.hunger) + 20);
      gainXP(CONFIG.XP_PER_INTERACTION); // +5 XP
      saveToLocalStorage();

      caillouImg.style.opacity = '0';
      setTimeout(() => {
        caillouState.currentMood = null;
        updateDisplay();
        caillouImg.style.opacity = '1';

        isFeeding = false;
        btn.disabled = false;
      }, 150);
    }, 1000);
  }

  let isPlaying = false;

  function play() {
    if (isPlaying || caillouState.isDead) return;
    isPlaying = true;

    const btn = document.getElementById('btn-play');
    const caillouImg = document.getElementById('caillou');
    const screen = document.getElementById('game-screen');
    btn.disabled = true;

    caillouImg.style.animation = 'none';
    setTimeout(() => {
      caillouImg.style.animation = 'bounce-play 0.8s ease-out';
    }, 10);

    const emojis = ['🎮', '⚽', '🎯', '🎲', '🎪', '✨'];
    const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
    
    const emojiEl = document.createElement('div');
    emojiEl.className = 'play-emoji';
    emojiEl.textContent = randomEmoji;
    screen.appendChild(emojiEl);

    const boost = Math.floor(
      Math.random() * (CONFIG.PLAY_BOOST_MAX - CONFIG.PLAY_BOOST_MIN + 1) 
      + CONFIG.PLAY_BOOST_MIN
    );

    setTimeout(() => {
      caillouState.boredom = Math.min(100, Number(caillouState.boredom) + boost);
      caillouState.happiness = Math.min(100, Number(caillouState.happiness) + 10);
      gainXP(CONFIG.XP_PER_INTERACTION); // +5 XP
      
      saveToLocalStorage();
      updateDisplay();

      console.log(`Joué avec le caillou! Amusement +${boost}%, Bonheur +10%, +${CONFIG.XP_PER_INTERACTION} XP`);

      setTimeout(() => {
        emojiEl.remove();
      }, 1000);

      caillouImg.style.animation = 'idle-bob 2s ease-in-out infinite';

      isPlaying = false;
      btn.disabled = false;
    }, 800);
  }

  let isPetting = false;

  function pet() {
    if (isPetting || caillouState.isDead) return;
    isPetting = true;

    const btn = document.getElementById('btn-pet');
    const caillouImg = document.getElementById('caillou');
    btn.disabled = true;

    const imageSet = getCurrentImageSet();
    caillouImg.style.opacity = '0';
    setTimeout(() => {
      caillouImg.src = imageSet.PET;
      caillouImg.style.opacity = '1';
    }, 150);

    setTimeout(() => {
      caillouState.happiness = Math.min(100, Number(caillouState.happiness) + 20);
      gainXP(CONFIG.XP_PER_INTERACTION); // +5 XP
      saveToLocalStorage();

      caillouImg.style.opacity = '0';
      setTimeout(() => {
        caillouState.currentMood = null;
        updateDisplay();
        caillouImg.style.opacity = '1';

        isPetting = false;
        btn.disabled = false;
      }, 150);
    }, 1000);
  }

  // ====================================
  // NOMMAGE
  // ====================================

  function showNamingScreen() {
    document.getElementById('naming-screen').classList.remove('hidden');
    setTimeout(() => document.getElementById('naming-input').focus(), 100);
  }

  function confirmName() {
    const input = document.getElementById('naming-input');
    let name = input.value.trim();

    if (!name) {
      name = 'Rocky';
    }

    caillouState.name = name;
    saveToLocalStorage();
    document.getElementById('naming-screen').classList.add('hidden');
    updateTitle();
    
    console.log("Nom du caillou confirmé :", name);
  }

  function updateTitle() {
    const titleEl = document.getElementById('device-title');
    if (caillouState.name) {
      titleEl.innerHTML = `🪨 ${caillouState.name} 🪨`;
    } else {
      titleEl.textContent = '🪨 CAILLOU 🪨';
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !document.getElementById('naming-screen').classList.contains('hidden')) {
      confirmName();
    }
  });

  // ====================================
  // INITIALISATION
  // ====================================
  
  function init() {
    console.log('Initialisation du Tamagotchi Caillou...');
    
    const hasData = loadFromLocalStorage();
    
    if (hasData) {
      console.log('Données existantes trouvées');
      catchUpMissedDecay();
      if (caillouState.isDead || checkDeath()) {
        showGameOver();
      }
    } else {
      console.log('Première visite - initialisation des données');
      saveToLocalStorage();
      showNamingScreen();
    }

    if (hasData && !caillouState.name) {
      showNamingScreen();
    }

    updateTitle();
    updateDisplay();
    updateXPDisplay();
    
    if (!caillouState.isDead) {
      decayTimer = setInterval(decayStats, CONFIG.DECAY_INTERVAL);
    }
    
    console.log('Tamagotchi Caillou initialisé avec succès!');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>

</body>
</html>
