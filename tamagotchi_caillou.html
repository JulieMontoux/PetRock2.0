<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamagotchi Caillou 🪨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #f5efe0;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(200,180,140,0.3) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(180,160,120,0.2) 0%, transparent 50%);
  }

  .device {
    width: 280px;
    background: #e8dcc8;
    border-radius: 40px 40px 60px 60px;
    border: 4px solid #c4a882;
    box-shadow:
      0 8px 0 #a08060,
      0 12px 30px rgba(0,0,0,0.25),
      inset 0 2px 4px rgba(255,255,255,0.5);
    padding: 24px 20px 32px;
    position: relative;
  }

  .device::before {
    content: '';
    position: absolute;
    top: 12px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 8px;
    background: rgba(255,255,255,0.4);
    border-radius: 4px;
  }

  .title {
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: #3d2b1f;
    letter-spacing: 2px;
    margin-bottom: 16px;
    opacity: 0.6;
  }

  .screen {
    background: #d4e8c2;
    border-radius: 20px;
    border: 3px solid #8ab06a;
    box-shadow: inset 0 4px 12px rgba(0,0,0,0.15), 0 2px 4px rgba(255,255,255,0.6);
    position: relative;
    overflow: hidden;
    height: 240px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .screen::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
    border-radius: 18px 18px 0 0;
    pointer-events: none;
    z-index: 10;
  }

  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 22px;
    background: linear-gradient(to bottom, #b8d890, #90b870);
    border-radius: 0 0 18px 18px;
  }

  #caillou {
    width: 130px;
    height: 130px;
    object-fit: contain;
    position: relative;
    z-index: 2;
    margin-bottom: 14px;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.3));
    animation: idle-bob 2s ease-in-out infinite;
    transform-origin: center bottom;
  }

  @keyframes idle-bob {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-8px); }
  }

  .stats {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stat-label {
    font-family: 'Fredoka One', cursive;
    font-size: 0.75rem;
    color: #3d2b1f;
    min-width: 65px;
    text-align: right;
  }

  .stat-bar-container {
    flex: 1;
    height: 18px;
    background: rgba(255,255,255,0.4);
    border-radius: 10px;
    border: 2px solid #a08060;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
  }

  .stat-bar {
    height: 100%;
    transition: width 0.5s ease-out, background-color 0.3s ease;
    border-radius: 8px 0 0 8px;
    position: relative;
    overflow: hidden;
  }

  .stat-bar::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
  }

  .stat-value {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Fredoka One', cursive;
    font-size: 0.65rem;
    color: #3d2b1f;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    z-index: 1;
  }

  .faim { background: linear-gradient(135deg, #ff9a76, #ff6b6b); }
  .ennui { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
  .bonheur { background: linear-gradient(135deg, #ffd93d, #ffb142); }
</style>
</head>
<body>

<div class="device">
  <div class="title">🪨 CAILLOU 🪨</div>

  <div class="screen">
    <div class="ground"></div>
    <img id="caillou" src="Sprite caillou.png" alt="Caillou" />
  </div>

  <div class="stats">
    <div class="stat-row">
      <div class="stat-label">🍖 Faim</div>
      <div class="stat-bar-container">
        <div class="stat-bar faim" id="faim-bar" style="width: 100%"></div>
        <div class="stat-value" id="faim-value">100%</div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-label">🎮 Ennui</div>
      <div class="stat-bar-container">
        <div class="stat-bar ennui" id="ennui-bar" style="width: 100%"></div>
        <div class="stat-value" id="ennui-value">100%</div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-label">😊 Bonheur</div>
      <div class="stat-bar-container">
        <div class="stat-bar bonheur" id="bonheur-bar" style="width: 100%"></div>
        <div class="stat-value" id="bonheur-value">100%</div>
      </div>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'tamagotchi_caillou_data';
  const DECAY_INTERVAL = 30000; // 30 secondes
  const DECAY_AMOUNT = 5; // Diminue de 5% toutes les 30s

  let stats = {
    faim: 100,
    ennui: 100,
    bonheur: 100,
    lastUpdate: Date.now()
  };

  // Charger les données depuis localStorage
  function loadStats() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        stats = parsed;
        
        // Calculer le temps écoulé et rattraper les diminutions
        const now = Date.now();
        const elapsed = now - stats.lastUpdate;
        const missedIntervals = Math.floor(elapsed / DECAY_INTERVAL);
        
        if (missedIntervals > 0) {
          stats.faim = Math.max(0, stats.faim - (DECAY_AMOUNT * missedIntervals));
          stats.ennui = Math.max(0, stats.ennui - (DECAY_AMOUNT * missedIntervals));
          stats.bonheur = Math.max(0, stats.bonheur - (DECAY_AMOUNT * missedIntervals));
          stats.lastUpdate = now;
          saveStats();
        }
      } catch (e) {
        console.error('Erreur lors du chargement des stats', e);
      }
    }
  }

  // Sauvegarder les données dans localStorage
  function saveStats() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
  }

  // Mettre à jour l'affichage
  function updateDisplay() {
    // Faim
    document.getElementById('faim-bar').style.width = stats.faim + '%';
    document.getElementById('faim-value').textContent = Math.round(stats.faim) + '%';
    
    // Ennui
    document.getElementById('ennui-bar').style.width = stats.ennui + '%';
    document.getElementById('ennui-value').textContent = Math.round(stats.ennui) + '%';
    
    // Bonheur
    document.getElementById('bonheur-bar').style.width = stats.bonheur + '%';
    document.getElementById('bonheur-value').textContent = Math.round(stats.bonheur) + '%';
  }

  // Diminuer les stats
  function decayStats() {
    stats.faim = Math.max(0, stats.faim - DECAY_AMOUNT);
    stats.ennui = Math.max(0, stats.ennui - DECAY_AMOUNT);
    stats.bonheur = Math.max(0, stats.bonheur - DECAY_AMOUNT);
    stats.lastUpdate = Date.now();
    
    saveStats();
    updateDisplay();
  }

  // Initialisation
  loadStats();
  updateDisplay();

  // Timer pour la diminution automatique
  setInterval(decayStats, DECAY_INTERVAL);
</script>

</body>
</html>
